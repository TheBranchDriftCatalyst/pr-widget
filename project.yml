name: PArr
options:
  bundleIdPrefix: com.catalyst.prwidget
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false

packages:
  CatalystSwift:
    path: ../catalyst-swift

targets:
  PRWidget:
    type: application
    platform: macOS
    sources:
      - path: PRWidget
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: CatalystSwift
    resources:
      - path: PRWidget/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.catalyst.p-arr
        INFOPLIST_FILE: PRWidget/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: PRWidget/Resources/PRWidget.entitlements
        PRODUCT_NAME: "P-Arr"
        MARKETING_VERSION: "0.6.11" # Source of truth: VERSION file (synced via `task version:bump`)
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: true
        SWIFT_STRICT_CONCURRENCY: complete
    entitlements:
      path: PRWidget/Resources/PRWidget.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true

  PRWidgetTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PRWidgetTests
    dependencies:
      - target: PRWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.catalyst.p-arr.tests

  PRWidgetUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: PRWidgetUITests
    dependencies:
      - target: PRWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.catalyst.p-arr.uitests
        INFOPLIST_FILE: PRWidgetUITests/Info.plist
        TEST_TARGET_NAME: PRWidget
        SWIFT_STRICT_CONCURRENCY: complete
