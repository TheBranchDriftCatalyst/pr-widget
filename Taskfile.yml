version: "3"

vars:
  APP_NAME: "P-Arr"
  BUNDLE_ID: com.catalyst.p-arr
  BUILD_DIR: .build
  APP_PATH: ".build/P-Arr.app"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all

  build:
    desc: Build the app (debug)
    cmds:
      - swift build 2>&1
    sources:
      - PRWidget/**/*.swift
      - Package.swift

  build:release:
    desc: Build the app (release, optimized)
    cmds:
      - swift build -c release 2>&1
    sources:
      - PRWidget/**/*.swift
      - Package.swift

  bundle:
    desc: Assemble .app bundle from debug build
    deps: [build]
    cmds:
      - BUILD_DIR=.build/debug ./scripts/bundle.sh

  bundle:release:
    desc: Assemble .app bundle from release build
    deps: [build:release]
    cmds:
      - BUILD_DIR=.build/release ./scripts/bundle.sh

  run:
    desc: Build, bundle, and run the app
    deps: [bundle]
    cmds:
      - |
        # Kill existing instance
        pkill -x PArr 2>/dev/null || true
        sleep 0.3
        open "{{.APP_PATH}}"
        echo "✅ P-Arr launched"

  dev:
    desc: Development mode with live reload on file changes
    cmds:
      - |
        echo "🔄 Starting PR Widget dev mode..."
        echo "   Watching PRWidget/ for changes"
        echo "   Press Ctrl+C to stop"
        echo ""

        # Initial build + run
        task run

        echo ""
        echo "━━━ Watching for changes... ━━━"

        # Watch for changes and rebuild
        fswatch -o -r \
          --include='\.swift$' \
          --include='\.plist$' \
          --exclude='\.build' \
          PRWidget/ Package.swift \
        | while read -r _; do
          echo ""
          echo "━━━ $(date +%H:%M:%S) Change detected — rebuilding... ━━━"
          # Debounce: drain pending events
          sleep 0.5

          if task run 2>&1; then
            echo "━━━ ✅ Rebuilt successfully — watching... ━━━"
          else
            echo "━━━ ⚠️  Build failed — watching for fix... ━━━"
          fi
        done

  test:
    desc: Run unit tests
    cmds:
      - swift test 2>&1

  test:ui:
    desc: Run XCUITests (generates xcodeproj first)
    deps: [generate]
    cmds:
      - |
        xcodebuild test \
          -project PArr.xcodeproj \
          -scheme PRWidget \
          -only-testing:PRWidgetUITests \
          -destination 'platform=macOS' \
          2>&1 | xcbeautify

  clean:
    desc: Clean build artifacts
    cmds:
      - swift package clean
      - rm -rf "{{.APP_PATH}}"
      - rm -rf PRWidget.xcodeproj
      - echo "✅ Cleaned build artifacts"

  generate:
    desc: Generate Xcode project (for IDE use)
    cmds:
      - xcodegen generate
    sources:
      - project.yml

  open:
    desc: Open in Xcode (generates xcodeproj first)
    deps: [generate]
    cmds:
      - open PRWidget.xcodeproj

  lint:
    desc: Run SwiftLint (if installed)
    cmds:
      - swiftlint lint PRWidget/ || echo "SwiftLint not installed, skipping"

  setup:
    desc: Install development dependencies
    cmds:
      - brew install fswatch xcbeautify lefthook git-cliff 2>/dev/null || true
      - task cask:setup
      - swift package resolve
      - |
        if git rev-parse --git-dir &>/dev/null 2>&1; then
          lefthook install
          echo "✅ Git hooks installed"
        else
          echo "⚠️  No git repo — run 'git init' then 'lefthook install'"
        fi
      - echo ""
      - echo "✅ Setup complete!"
      - echo "   Run 'task dev' for live-reload development"
      - echo "   Run 'task open' to work in Xcode"

  # ── Version management ──────────────────────────────────────

  version:
    desc: Show current version
    cmds:
      - |
        VER=$(tr -d '[:space:]' < VERSION)
        if git rev-parse --git-dir &>/dev/null 2>&1; then
          BUILD=$(git rev-list --count HEAD 2>/dev/null || echo "0")
        else
          BUILD="0"
        fi
        echo "Version: ${VER} (build ${BUILD})"

  version:check:
    desc: Verify VERSION file and project.yml are in sync
    cmds:
      - |
        VER=$(tr -d '[:space:]' < VERSION)
        PROJ_VER=$(grep 'MARKETING_VERSION:' project.yml | head -1 | sed 's/.*"\(.*\)".*/\1/')
        if [[ "$VER" == "$PROJ_VER" ]]; then
          echo "✅ Versions in sync: ${VER}"
        else
          echo "❌ Version mismatch!"
          echo "   VERSION file:  ${VER}"
          echo "   project.yml:   ${PROJ_VER}"
          exit 1
        fi

  version:bump:
    desc: "Bump version (usage: task version:bump -- patch|minor|major)"
    silent: true
    cmds:
      - |
        source scripts/_brand.sh
        BUMP="{{.CLI_ARGS}}"
        BUMP="${BUMP:-patch}"
        CURRENT=$(tr -d '[:space:]' < VERSION)
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

        case "$BUMP" in
          major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
          patch) PATCH=$((PATCH + 1)) ;;
          *) err "Usage: task version:bump -- patch|minor|major"; exit 1 ;;
        esac

        NEW="${MAJOR}.${MINOR}.${PATCH}"
        echo "$NEW" > VERSION
        sed -i '' "s/MARKETING_VERSION: \"${CURRENT}\"/MARKETING_VERSION: \"${NEW}\"/" project.yml
        done_step "Version ${DIM}${CURRENT}${RESET} → ${CYAN}${NEW}${RESET}"

  changelog:
    desc: Generate CHANGELOG.md from conventional commits
    silent: true
    cmds:
      - |
        source scripts/_brand.sh
        VER=$(tr -d '[:space:]' < VERSION)
        step "Generating changelog..."
        git-cliff --tag "v${VER}" -o CHANGELOG.md 2>/dev/null
        done_step "Changelog generated"

  release:
    desc: "Cut a release (usage: task release -- patch|minor|major)"
    silent: true
    cmds:
      - |
        source scripts/_brand.sh
        BUMP="{{.CLI_ARGS}}"
        BUMP="${BUMP:-patch}"

        header "Release ${DIM}(${BUMP})${RESET}"

        # 1. Bump version
        task version:bump -- "$BUMP"
        VER=$(tr -d '[:space:]' < VERSION)

        # 2. Generate changelog FIRST (so it's bundled in the app)
        task changelog

        # 3. Package (includes updated CHANGELOG.md with this version's entry)
        task package

        # 4. Update cask (needs package for SHA)
        task cask:update

        cd catalyst-cask
        git add Casks/p-arr.rb > /dev/null
        git commit -m "Update p-arr to v${VER}" --quiet
        git push origin main --quiet 2>/dev/null
        cd ..

        git add VERSION project.yml catalyst-cask > /dev/null
        git commit -m "chore: update catalyst-cask to p-arr v${VER}" --quiet

        # 5. Regenerate changelog (now includes the cask commit)
        task changelog
        git add CHANGELOG.md > /dev/null
        git commit -m "chore(release): v${VER}" --quiet

        # 4. Tag after all commits
        step "Tagging ${CYAN}v${VER}${RESET}..."
        git tag "v${VER}"

        step "Pushing..."
        git push origin main --quiet 2>/dev/null
        git push origin "v${VER}" --quiet 2>/dev/null
        done_step "Pushed ${CYAN}v${VER}${RESET} to origin"

  release:patch:
    desc: "Release a patch version (bugfix)"
    silent: true
    cmds:
      - task release -- patch

  release:minor:
    desc: "Release a minor version (new features)"
    silent: true
    cmds:
      - task release -- minor

  release:major:
    desc: "Release a major version (breaking changes)"
    silent: true
    cmds:
      - task release -- major

  ship:
    desc: "Fire-and-forget: release + publish in one shot (usage: task ship -- patch|minor|major)"
    silent: true
    cmds:
      - |
        BUMP="{{.CLI_ARGS}}"
        BUMP="${BUMP:-patch}"
        task release -- "$BUMP"
        task publish
        source scripts/_brand.sh
        VER=$(tr -d '[:space:]' < VERSION)
        footer "P-Arr v${VER} shipped" "https://github.com/TheBranchDriftCatalyst/pr-widget/releases/tag/v${VER}"

  ship:patch:
    desc: "Ship a patch release (bugfix) — fire and forget"
    silent: true
    cmds:
      - task ship -- patch

  ship:minor:
    desc: "Ship a minor release (feature) — fire and forget"
    silent: true
    cmds:
      - task ship -- minor

  ship:major:
    desc: "Ship a major release (breaking) — fire and forget"
    silent: true
    cmds:
      - task ship -- major

  # ── Packaging & Distribution ──────────────────────────────────

  package:
    desc: Build release, bundle .app, create versioned .zip
    silent: true
    cmds:
      - ./scripts/package.sh
    sources:
      - PRWidget/**/*.swift
      - Package.swift
      - VERSION

  publish:
    desc: "Create GitHub release from existing tag and package"
    silent: true
    cmds:
      - |
        source scripts/_brand.sh
        VER=$(tr -d '[:space:]' < VERSION)
        ZIP=".build/P-Arr-${VER}.zip"

        if ! command -v gh &>/dev/null; then
          err "gh CLI not installed. Run: brew install gh"
          exit 1
        fi

        if [[ ! -f "$ZIP" ]]; then
          err "$ZIP not found. Run 'task release' first."
          exit 1
        fi

        header "Publish ${CYAN}v${VER}${RESET}"

        step "Creating GitHub release..."
        RELEASE_URL=$(gh release create "v${VER}" "$ZIP" \
          --title "P-Arr v${VER}" \
          --notes-file CHANGELOG.md 2>&1)
        done_step "GitHub release created"
        info "${DIM}${RELEASE_URL}${RESET}"

  cask:update:
    desc: "Update cask formula with current version and SHA256"
    silent: true
    cmds:
      - |
        source scripts/_brand.sh
        VER=$(tr -d '[:space:]' < VERSION)
        ZIP=".build/P-Arr-${VER}.zip"
        CASK="catalyst-cask/Casks/p-arr.rb"

        if [[ ! -f "$ZIP" ]]; then
          err "$ZIP not found. Run 'task package' first."
          exit 1
        fi

        if [[ ! -f "$CASK" ]]; then
          err "$CASK not found. Run 'task cask:setup' first."
          exit 1
        fi

        SHA256=$(shasum -a 256 "$ZIP" | awk '{print $1}')
        sed -i '' "s/version \".*\"/version \"${VER}\"/" "$CASK"
        sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" "$CASK"
        done_step "Cask formula updated ${DIM}(${SHA256:0:12}...)${RESET}"

  # ── Icon Generation ──────────────────────────────────────────────

  icons:generate:
    desc: Generate macOS icon assets from source PNGs
    cmds:
      - ./scripts/generate-icons.sh --variant all --active a

  icons:generate:a:
    desc: Generate variant A icons only
    cmds:
      - ./scripts/generate-icons.sh --variant a --active a

  icons:generate:b:
    desc: Generate variant B icons only
    cmds:
      - ./scripts/generate-icons.sh --variant b --active b

  icons:clean:
    desc: Remove generated icon assets
    cmds:
      - rm -rf PRWidget/Resources/Assets.xcassets/AppIcon-A.appiconset
      - rm -rf PRWidget/Resources/Assets.xcassets/AppIcon-B.appiconset
      - rm -rf PRWidget/Resources/Assets.xcassets/MenuBarIcon-A.imageset
      - rm -rf PRWidget/Resources/Assets.xcassets/MenuBarIcon-B.imageset
      - rm -rf PRWidget/Resources/Assets.xcassets/AppIconPreview-A.imageset
      - rm -rf PRWidget/Resources/Assets.xcassets/AppIconPreview-B.imageset
      - rm -rf .build/icons
      - echo "✅ Generated icon assets cleaned"

  # ── Documentation ──────────────────────────────────────────────

  docs:build:
    desc: Build DocC documentation for catalyst-lib
    cmds:
      - |
        cd catalyst-lib
        swift package generate-documentation \
          --target CatalystSwift \
          --output-path ../.build/docs
        echo "✅ Docs built at .build/docs/"

  docs:preview:
    desc: Preview DocC documentation in browser
    cmds:
      - |
        cd catalyst-lib
        swift package --disable-sandbox preview-documentation --target CatalystSwift

  docs:export:
    desc: Export DocC documentation as static HTML
    cmds:
      - |
        cd catalyst-lib
        swift package generate-documentation \
          --target CatalystSwift \
          --transform-for-static-hosting \
          --hosting-base-path CatalystSwift \
          --output-path ../.build/docs-site
        echo "✅ Static docs exported to .build/docs-site/"

  # ── Packaging & Distribution ──────────────────────────────────

  cask:setup:
    desc: "Initialize/update the catalyst-cask submodule"
    cmds:
      - git submodule update --init --recursive
      - echo "✅ catalyst-cask submodule ready"
